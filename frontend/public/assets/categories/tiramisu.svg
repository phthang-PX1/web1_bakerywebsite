<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Tiramisu — layered cube with cocoa dust and a spoon -->
  <g stroke="#2b1a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- cocoa dust -->
    <g stroke="#c47a2b" stroke-width="2">
      <path d="M42 30h.1M52 26h.1M64 29h.1M74 25h.1M82 32h.1"/>
    </g>
    <!-- layers -->
    <rect x="32" y="38" width="56" height="12" rx="2" fill="#c96a2e" opacity="0.85"/>
    <rect x="32" y="50" width="56" height="14" fill="#fff5ee"/>
    <rect x="32" y="64" width="56" height="12" fill="#f5e6d3"/>
    <rect x="32" y="76" width="56" height="14" rx="2" fill="#fff5ee"/>
    <path d="M32 50h56M32 64h56M32 76h56" stroke="#c47a2b"/>
    <!-- outline -->
    <rect x="32" y="38" width="56" height="52" rx="3"/>
    <!-- plate -->
    <path d="M24 96h72"/>
    <!-- spoon -->
    <path d="M100 52c4 0 6 3 6 6s-2 6-6 6" fill="#f5c842" stroke="#c47a2b" stroke-width="2"/>
    <path d="M100 64v20" stroke="#c47a2b" stroke-width="2"/>
  </g>
</svg>
