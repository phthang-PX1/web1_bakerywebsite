<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bánh Gato — layered celebration cake with a candle -->
  <g stroke="#2b1a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- candle -->
    <path d="M60 22v10" stroke="#c47a2b"/>
    <path d="M60 14c2.6 3 2.6 5.4 0 7-2.6-1.6-2.6-4 0-7z" fill="#f5c842" stroke="#c47a2b" stroke-width="2"/>
    <!-- top tier -->
    <rect x="38" y="48" width="44" height="20" rx="4" fill="#fff5ee"/>
    <path d="M38 56c4 4 7-3 11 1s7-3 11 1 7-3 11 1 7-3 11 1" stroke="#c96a2e" fill="none"/>
    <!-- bottom tier -->
    <rect x="26" y="68" width="68" height="26" rx="5" fill="#f5e6d3"/>
    <path d="M26 77c5 4 8-3 13 1s8-3 13 1 8-3 13 1 8-3 13 1 8-3 13 1" stroke="#c96a2e" fill="none"/>
    <!-- plate -->
    <path d="M20 96h80" />
    <path d="M34 102h52" stroke="#c47a2b"/>
    <!-- cherries on top tier -->
    <circle cx="48" cy="44" r="3.5" fill="#c96a2e" stroke="#2b1a0f" stroke-width="2"/>
    <circle cx="72" cy="44" r="3.5" fill="#c96a2e" stroke="#2b1a0f" stroke-width="2"/>
  </g>
  <!-- sparkles -->
  <g stroke="#c47a2b" stroke-width="2" stroke-linecap="round">
    <path d="M30 30l0 6M27 33l6 0"/>
    <path d="M92 26l0 6M89 29l6 0"/>
  </g>
</svg>
