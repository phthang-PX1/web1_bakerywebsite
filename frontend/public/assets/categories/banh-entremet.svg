<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Bánh Entremet — glossy mirror-glaze dome with a cut slice -->
  <g stroke="#2b1a0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- dome body -->
    <path d="M24 74c0-20 16-32 36-32s36 12 36 32v6H24v-6z" fill="#fff5ee"/>
    <!-- glaze drips -->
    <path d="M24 66c6 0 6 8 12 8s6-6 12-6 6 7 12 7 6-6 12-6 6 7 12 7 6-7 12-7" stroke="#c96a2e" fill="none"/>
    <!-- gloss highlight -->
    <path d="M40 54c3-4 8-7 13-8" stroke="#c47a2b"/>
    <!-- plate -->
    <path d="M18 80h84"/>
    <path d="M30 87h60" stroke="#c47a2b"/>
    <!-- slice on the side -->
    <path d="M88 96l14-12v12H88z" fill="#f5e6d3"/>
    <!-- berry + leaf on top -->
    <circle cx="60" cy="36" r="4" fill="#c96a2e" stroke="#2b1a0f" stroke-width="2"/>
    <path d="M64 32c3-3 7-3 9-1-2 3-6 4-9 1z" fill="#f5c842" stroke="#c47a2b" stroke-width="2"/>
  </g>
</svg>
