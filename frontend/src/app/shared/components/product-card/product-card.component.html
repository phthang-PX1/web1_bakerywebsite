<article class="product-card" [class.product-card--compact]="compact()">
  <a class="product-card__media" [routerLink]="['/products', product().slug]" [attr.aria-label]="product().name" tabindex="-1">
    <img [src]="product().imageUrl ?? '/assets/images/product-placeholder.svg'"
         [alt]="product().name"
         loading="lazy" />
    @if (product().badge) {
      <span class="product-card__badge">{{ product().badge }}</span>
    }
  </a>

  <div class="product-card__body">
    <a class="product-card__name" [routerLink]="['/products', product().slug]">{{ product().name }}</a>

    <div class="product-card__rating" aria-label="Đánh giá sản phẩm">
      <span class="product-card__stars" aria-hidden="true">★</span>
      <strong>{{ product().rating.toFixed(1) }}</strong>
      <span class="product-card__review-count">({{ product().reviewCount }})</span>
    </div>

    <div class="product-card__price-row">
      <span class="product-card__price">{{ product().price | currencyVnd }}</span>
      @if (needsDetail()) {
        <a class="product-card__customize-btn"
           [routerLink]="['/products', product().slug]"
           aria-label="Tùy chỉnh sản phẩm"
           title="Tùy chỉnh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </a>
      }
    </div>

    <button class="product-card__btn" type="button" [disabled]="adding()" (click)="onAddToCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15" aria-hidden="true">
        <path d="M6 7h12l1 13H5L6 7z"/>
        <path d="M9 10V6a3 3 0 0 1 6 0v4"/>
      </svg>
      {{ adding() ? 'Đang thêm...' : 'Thêm vào giỏ' }}
    </button>
  </div>
</article>
