<section class="custom-cta" aria-labelledby="custom-cake-title">
  <div class="custom-cta__copy">
    <p>Tùy chỉnh theo dịp riêng</p>
    <h2 id="custom-cake-title">Tạo nên Khoảnh khắc Ngọt ngào</h2>
    <span>
      Thiết kế chiếc bánh trong mơ của riêng bạn. Chọn hương vị, màu sắc và phong cách trang trí để tạo nên nét riêng biệt.
    </span>
    <a routerLink="/custom-cake">Bắt đầu thiết kế</a>
  </div>

  <div class="custom-cta__visual" aria-hidden="true">
    <img [src]="cakeImageUrl" alt="" />
    <span class="spark spark--one"></span>
    <span class="spark spark--two"></span>
  </div>
</section>
