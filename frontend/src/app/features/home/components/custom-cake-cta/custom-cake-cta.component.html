<section class="custom-cta">
  <div class="custom-cta__inner">
    <!-- Left copy -->
    <div class="custom-cta__copy">
      <span class="custom-cta__eyebrow">
        <span class="custom-cta__eyebrow-dot" aria-hidden="true"></span>
        Dịch vụ đặc biệt
      </span>
      <h2 class="custom-cta__heading">
        Tạo nên<br>
        <em>Khoảnh Khắc</em><br>
        Ngọt Ngào
      </h2>
      <p class="custom-cta__body">
        Thiết kế chiếc bánh trong mơ của riêng bạn. Chọn hương vị, màu sắc và trang trí để tạo nên nét riêng biệt không thể nhầm lẫn.
      </p>
      <div class="custom-cta__actions">
        <a class="custom-cta__btn" routerLink="/custom-cake">
          Bắt đầu thiết kế
          <span class="cta-icon" aria-hidden="true">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
        </a>
        <span class="custom-cta__hint">Miễn phí tư vấn thiết kế</span>
      </div>
      <!-- Trust badges -->
      <div class="custom-cta__badges">
        <div class="custom-cta__badge">
          <img src="/assets/icons/productdetail-doitra.png" alt="" />
          <span>Đảm bảo chất lượng</span>
        </div>
        <div class="custom-cta__badge">
          <img src="/assets/icons/productdetail-vanchuyen.png" alt="" />
          <span>Giao hàng tận nơi</span>
        </div>
      </div>
    </div>

    <!-- Right visual -->
    <div class="custom-cta__visual" aria-hidden="true">
      <div class="custom-cta__ring custom-cta__ring--outer"></div>
      <div class="custom-cta__ring custom-cta__ring--inner"></div>
      <div class="custom-cta__img-wrap">
        <img [src]="cakeImageUrl" alt="" />
      </div>
      <span class="custom-cta__spark custom-cta__spark--a"></span>
      <span class="custom-cta__spark custom-cta__spark--b"></span>
      <span class="custom-cta__spark custom-cta__spark--c"></span>
    </div>
  </div>
</section>
