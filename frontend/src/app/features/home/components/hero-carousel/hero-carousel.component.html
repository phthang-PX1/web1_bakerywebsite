<section
  class="hero-carousel"
  aria-label="Banner WeBee"
  (mouseenter)="stopRotation()"
  (mouseleave)="startRotation()"
  (pointerdown)="onPointerDown($event)"
  (pointerup)="onPointerUp($event)"
>
  <div class="hero-carousel__viewport">
    <div class="hero-carousel__track" [style.transform]="'translateX(-' + current() * 100 + '%)'">
      @for (banner of banners(); track banner.id; let idx = $index) {
        <div
          class="hero-carousel__slide"
          [attr.aria-hidden]="current() !== idx"
        >
          <img [src]="banner.imageUrl" [alt]="banner.title" draggable="false" />
        </div>
      }
    </div>
  </div>

  @if (slideCount() > 1) {
    <button
      class="hero-carousel__arrow hero-carousel__arrow--prev"
      type="button"
      (click)="prev()"
      aria-label="Banner truoc"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>
    <button
      class="hero-carousel__arrow hero-carousel__arrow--next"
      type="button"
      (click)="next()"
      aria-label="Banner sau"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
        <path d="M9 6l6 6-6 6" />
      </svg>
    </button>

    <div class="hero-carousel__dots" role="tablist" aria-label="Chon banner">
      @for (banner of banners(); track banner.id; let idx = $index) {
        <button
          type="button"
          class="hero-carousel__dot"
          [class.hero-carousel__dot--active]="current() === idx"
          (click)="goTo(idx)"
          [attr.aria-label]="'Banner ' + (idx + 1)"
        ></button>
      }
    </div>
  }
</section>
