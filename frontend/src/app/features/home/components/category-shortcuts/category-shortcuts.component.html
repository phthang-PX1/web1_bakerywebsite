<section class="categories">
  <div class="categories__header">
    <div class="categories__title-block">
      <span class="categories__eyebrow">Danh mục nổi bật</span>
      <h2 class="categories__title">Tìm kiếm theo loại bánh</h2>
    </div>
    <a class="categories__view-all" routerLink="/products">Tất cả sản phẩm</a>
  </div>

  @if (loading()) {
    <div class="category-index">
      @for (i of [1,2,3,4,5,6]; track i) {
        <div class="category-skeleton"></div>
      }
    </div>
  } @else if (!error() && categories().length > 0) {
    <div class="category-index">
      @for (cat of categories(); track cat.id; let idx = $index) {
        <a class="category-row"
           [routerLink]="['/products']"
           [queryParams]="{ category: cat.slug }">
          <span class="category-row__num" aria-hidden="true">{{ (idx + 1) < 10 ? '0' + (idx + 1) : idx + 1 }}</span>
          <span class="category-row__name">{{ cat.name }}</span>
          <span class="category-row__arrow" aria-hidden="true">→</span>
        </a>
      }
    </div>
  }
</section>
